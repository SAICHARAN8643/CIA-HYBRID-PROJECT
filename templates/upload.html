<!DOCTYPE html>
<html>
<head>
    <title>Upload File</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            margin: 0; 
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #6a5acd, #00c6ff);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 {
            position: absolute;
            top: 40px;
            text-align: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        form {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 🔥 Textarea Styling */
        textarea {
            width: 250px;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            resize: none;
        }

        input[type="file"] {
            padding: 10px;
            border: 2px dashed #6a5acd;
            border-radius: 8px;
            width: 250px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(120deg, #00c6ff, #6a5acd);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .note {
            margin-top: 10px;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>

<h2>Upload Secure File</h2>

<form method="POST" enctype="multipart/form-data" onsubmit="return validateForm()">

    <!-- 🔥 TEXT INPUT -->
    <textarea name="data" placeholder="Enter secure text (optional)"></textarea><br><br>

    <!-- 🔥 FILE INPUT (removed required) -->
    <input type="file" name="file"><br><br>
    
    <div class="note">* File size should be less than 2MB</div>
    
    <button type="submit">Upload & Secure</button>
</form>

<!-- 🔥 VALIDATION SCRIPT -->
<script>
function validateForm() {
    const text = document.querySelector('textarea[name="data"]').value.trim();
    const file = document.querySelector('input[name="file"]').value;

    if (text === "" && file === "") {
        alert("⚠️ Please enter text or upload a file");
        return false;
    }
    return true;
}
</script>

</body>
</html>
