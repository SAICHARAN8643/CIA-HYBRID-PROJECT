<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: url('/static/images/particle_padlock.png') no-repeat center center fixed;
            background-size: cover;
        }





        .container {
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 40px 35px;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 18px 40px rgba(0, 229, 255, 0.2);
            text-align: center;
            z-index: 1;
            margin-left: 25vw;
        }

        @media (max-width: 900px) {
            body {
                justify-content: center;
            }
            .container {
                margin-left: 0;
            }
        }

        h2 {
            margin-bottom: 20px;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 28px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 9px;
            font-size: 16px;
            color: black;
            font-weight: bold;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        input::placeholder {
            color: rgba(0, 0, 0, 0.5);
            font-weight: normal;
        }

        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
            outline: none;
            background: rgba(255, 255, 255, 0.95);
        }

        /* Fix for Browser Autofill */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.85) inset !important;
            -webkit-text-fill-color: black !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        button {
            width: 100%;
            padding: 12px 25px;
            margin-top: 20px;
            background-color: #00e5ff;
            color: #001220;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #00b8e6;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
        }

        .footer {
            margin-top: 15px;
        }

        .footer p {
            margin: 5px 0;
            color: #ccc;
        }

        .footer a {
            text-decoration: none;
            color: #00e5ff;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            text-decoration: underline;
            color: #00b8e6;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.7);
        }
    </style>
</head>
<body>





<div class="container">
    <form method="POST">
        <h2>Login</h2>
        
        <input type="text" name="username" placeholder="Username" required>
        
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        <p>Don't have an account?</p>
        <a href="/signup">Create New Account</a>
    </div>
</div>

</body>
</html>
