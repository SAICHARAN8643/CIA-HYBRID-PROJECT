<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-image: url("{{ url_for('static', filename='images/13.jpeg') }}");
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover !important;
            filter: brightness(1.3) contrast(1.25);
            z-index: -2;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 229, 255, 0.15) 0%, rgba(10, 20, 35, 0.6) 100%);
            mix-blend-mode: hard-light;
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 35px;
            border-radius: 14px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            margin-left: 10%;
        }
        @media (max-width: 900px) {
            body { justify-content: center; }
            .container { margin-left: 0; padding: 35px 25px; }
        }
        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            color: #ffffff;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }
        input::placeholder { color: #ccc; }
        input:focus {
            border-color: #00e5ff;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.4);
        }
        .footer { margin-top: 20px; font-size: 14px; }
        .footer p { margin: 5px 0; color: #ddd; }
        .footer a {
            color: #00e5ff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        .footer a:hover {
            color: #00b8e6;
            text-decoration: underline;
        }
        .alert-success {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.5);
            color: #00ffcc;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .alert-error {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 51, 102, 0.5);
            color: #ff3366;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <form method="POST">
            <h2>Create Account</h2>
            
            {% if success_message %}
                <div class="alert-success">{{ success_message }}</div>
            {% endif %}
            
            {% if error_message %}
                <div class="alert-error">{{ error_message }}</div>
            {% endif %}

            <input type="text" name="username" placeholder="Create Username" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <div class="footer">
            <p>Already have an account?</p>
            <a href="/">Login Here</a>
        </div>
    </div>
</body>
</html>
