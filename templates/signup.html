<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body.signup-page {
            margin: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: url('/static/images/particle_padlock.png') no-repeat center center fixed;
            background-size: cover;
        }

        .signup-card {
            background: rgba(10, 20, 35, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 45px 40px;
            border-radius: 14px;
            box-shadow: 0 18px 40px rgba(0, 229, 255, 0.2);
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            margin-left: 20vw;
        }

        @media (max-width: 900px) {
            body.signup-page {
                justify-content: center;
            }
            .signup-card {
                margin-left: 0;
            }
        }

        .signup-card h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 28px;
        }

        .signup-card form {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .signup-card input[type="text"],
        .signup-card input[type="password"] {
            width: 100%;
            padding: 15px 14px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(255, 255, 255, 0.75);
            color: black;
            font-weight: bold;
            border-radius: 9px;
            margin: 10px 0;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        .signup-card input::placeholder {
            color: rgba(0, 0, 0, 0.5);
            font-weight: normal;
        }

        .signup-card input[type="text"]:focus,
        .signup-card input[type="password"]:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
            background: rgba(255, 255, 255, 0.95);
        }

        /* Fix for Browser Autofill */
        .signup-card input:-webkit-autofill,
        .signup-card input:-webkit-autofill:hover, 
        .signup-card input:-webkit-autofill:focus, 
        .signup-card input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px rgba(255, 255, 255, 0.85) inset !important;
            -webkit-text-fill-color: black !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .signup-card button {
            margin: 20px 0 10px 0;
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            background: #00e5ff;
            color: #001220;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .signup-card button:hover {
            background: #00b8e6;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
            transform: translateY(-2px);
        }

        .signup-card a {
            color: #00e5ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .signup-card a:hover {
            color: #00b8e6;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.7);
        }

        .signup-card .small-text {
            margin: 15px 0 0 0;
            color: #ccc;
        }
    </style>
</head>
<body class="signup-page">

<div class="signup-card">
    <h2>Create Account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Signup</button>
    </form>

    {% if success_message %}
        <div style="color: #00ffcc; background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.4); padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);">
            {{ success_message }}
        </div>
    {% endif %}
    {% if error_message %}
        <div style="color: #ff3366; background: rgba(255, 51, 102, 0.1); border: 1px solid rgba(255, 51, 102, 0.4); padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; text-shadow: 0 0 5px rgba(255, 51, 102, 0.5);">
            {{ error_message }}
        </div>
    {% endif %}

    <p class="small-text">Already have account? <a href="/">Login</a></p>
</div>

</body>
</html>
