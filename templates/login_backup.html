<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 🎥 Background Video */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* 🔲 Overlay (for readability) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 1;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus {
            border-color: #6a5acd;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #6a5acd;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #5941c2;
        }

        .footer {
            margin-top: 15px;
        }

        .footer p {
            margin: 5px 0;
            color: #333;
        }

        .footer a {
            text-decoration: none;
            color: #6a5acd;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video id="bg-video" autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='video/vecteezy_cyber-security-concept-shield-with-keyhole-icon-on-digital_4827654.mp4') }}" type="video/mp4">
    Your browser does not support the video tag.
</video>

<!-- 🔲 DARK OVERLAY -->
<div class="overlay"></div>

<div class="container">
    <form method="POST">
        <h2>Login</h2>
        
        <input type="text" name="username" placeholder="Username" required>
        
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit">Login</button>
    </form>

    <div class="footer">
        <p>Don't have an account?</p>
        <a href="/signup">Create New Account</a>
    </div>
</div>

</body>
</html>
